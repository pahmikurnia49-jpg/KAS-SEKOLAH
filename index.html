<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kas Sekolah</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1e3a8a',
                        secondary: '#3b82f6',
                        accent: '#f59e0b',
                        dark: '#0f172a',
                        light: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        .hidden-section { display: none !important; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans min-h-screen flex flex-col">

    <section id="login-section" class="flex-grow flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-md p-8 rounded-2xl shadow-xl border border-slate-200">
            <div class="text-center mb-8">
                <div class="bg-primary text-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fa-solid fa-wallet text-3xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-dark">Kas Sekolah</h1>
                <p class="text-slate-500 text-sm mt-1">Silakan masuk ke akun Anda</p>
            </div>
            
            <form id="form-login" class="space-y-5">
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-user text-slate-400"></i>
                        </div>
                        <input type="text" id="login-username" required class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                            <i class="fa-solid fa-lock text-slate-400"></i>
                        </div>
                        <input type="password" id="login-password" required class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary focus:border-secondary outline-none transition">
                    </div>
                </div>
                
                <div class="flex justify-between items-center text-sm">
                    <button type="button" onclick="showLupaPassword()" class="text-secondary hover:underline font-medium">Lupa Password?</button>
                </div>

                <button type="submit" class="w-full bg-primary hover:bg-dark text-white font-semibold py-2.5 rounded-lg shadow-md transition duration-300 flex justify-center items-center gap-2">
                    <i class="fa-solid fa-right-to-bracket"></i> Masuk
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-slate-600">
                Belum punya akun? <button onclick="toggleAuth('register')" class="text-secondary font-semibold hover:underline">Buat Akun Baru</button>
            </div>
        </div>
    </section>

    <section id="register-section" class="hidden-section flex-grow flex items-center justify-center p-4">
        <div class="glass-panel w-full max-w-lg p-8 rounded-2xl shadow-xl border border-slate-200">
            <h2 class="text-2xl font-bold text-dark mb-6 text-center">Buat Akun Unit</h2>
            
            <form id="form-register" class="space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
                        <input type="text" id="reg-nama" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Unit Akses</label>
                        <select id="reg-unit" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none bg-white">
                            <option value="">-- Pilih Unit --</option>
                            <option value="SMP">Unit SMP</option>
                            <option value="SMA">Unit SMA</option>
                            <option value="ALL">Super Admin (Yayasan)</option>
                        </select>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
                        <input type="text" id="reg-username" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
                        <input type="password" id="reg-password" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                    </div>
                </div>

                <div class="border-t border-slate-200 pt-4 mt-2">
                    <p class="text-xs text-slate-500 mb-3"><i class="fa-solid fa-circle-info text-secondary"></i> Keamanan ekstra jika lupa password</p>
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Pertanyaan Rahasia</label>
                            <select id="reg-tanya" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none bg-white">
                                <option value="Siapa nama hewan peliharaan pertama Anda?">Siapa nama hewan peliharaan pertama Anda?</option>
                                <option value="Apa nama sekolah dasar Anda?">Apa nama sekolah dasar Anda?</option>
                                <option value="Di kota mana ibu Anda lahir?">Di kota mana ibu Anda lahir?</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-slate-700 mb-1">Jawaban Rahasia</label>
                            <input type="text" id="reg-jawab" required class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-secondary outline-none">
                        </div>
                    </div>
                </div>

                <button type="submit" class="w-full bg-secondary hover:bg-primary text-white font-semibold py-2.5 rounded-lg shadow-md transition duration-300 mt-4">
                    <i class="fa-solid fa-user-plus"></i> Daftarkan Akun
                </button>
            </form>
            
            <div class="mt-4 text-center text-sm text-slate-600">
                Sudah punya akun? <button onclick="toggleAuth('login')" class="text-primary font-semibold hover:underline">Kembali ke Login</button>
            </div>
        </div>
    </section>

    <section id="dashboard-section" class="hidden-section flex-grow flex flex-col">
        <div class="p-8 text-center mt-20">
            <h1 class="text-4xl font-bold text-dark">Halo, <span id="dash-user-name" class="text-primary"></span>!</h1>
            <p class="mt-2 text-lg text-slate-600">Selamat datang di Panel Keuangan <span id="dash-unit" class="font-bold text-secondary"></span></p>
            <p class="mt-6 text-sm text-slate-500 italic">(Desain dashboard dan menu-menu kasir akan kita bangun di tahap selanjutnya)</p>
            <button onclick="logout()" class="mt-8 bg-red-500 hover:bg-red-600 text-white px-6 py-2 rounded-lg font-semibold shadow-md transition">
                <i class="fa-solid fa-power-off"></i> Logout
            </button>
        </div>
    </section>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
        import { getDatabase, ref, set, get, child } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

        // Konfigurasi Firebase Anda (Sudah Ditambahkan databaseURL)
        const firebaseConfig = {
            apiKey: "AIzaSyCWUYvBHaceSPa6-5xCGrsEABXBPQecCMw",
            authDomain: "kas-sekolah-4f5be.firebaseapp.com",
            databaseURL: "https://kas-sekolah-4f5be-default-rtdb.firebaseio.com", // Tambahan wajib untuk Realtime DB
            projectId: "kas-sekolah-4f5be",
            storageBucket: "kas-sekolah-4f5be.firebasestorage.app",
            messagingSenderId: "174683656489",
            appId: "1:174683656489:web:1a6f59d663452b46e9e738",
            measurementId: "G-42L162SZ6J"
        };

        // Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- Navigasi Login & Register ---
        window.toggleAuth = function(type) {
            document.getElementById('login-section').classList.add('hidden-section');
            document.getElementById('register-section').classList.add('hidden-section');
            if(type === 'login') {
                document.getElementById('login-section').classList.remove('hidden-section');
            } else {
                document.getElementById('register-section').classList.remove('hidden-section');
            }
        };

        // --- Logika Pembuatan Akun (Register) ---
        document.getElementById('form-register').addEventListener('submit', async (e) => {
            e.preventDefault();
            const nama = document.getElementById('reg-nama').value;
            const unit = document.getElementById('reg-unit').value;
            const username = document.getElementById('reg-username').value;
            const password = document.getElementById('reg-password').value;
            const tanya = document.getElementById('reg-tanya').value;
            const jawab = document.getElementById('reg-jawab').value;

            try {
                Swal.fire({title: 'Mendaftarkan Akun...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${username}`));
                
                if(snapshot.exists()) {
                    Swal.fire('Gagal!', 'Username ini sudah dipakai. Silakan gunakan yang lain.', 'warning');
                    return;
                }

                await set(ref(db, `users/${username}`), {
                    nama_admin: nama,
                    unit: unit,
                    password: password,
                    pertanyaan_rahasia: tanya,
                    jawaban_rahasia: jawab,
                    role: unit === 'ALL' ? 'super_admin' : 'admin_unit'
                });

                Swal.fire('Berhasil!', 'Akun Anda berhasil dibuat. Silakan login.', 'success').then(() => {
                    document.getElementById('form-register').reset();
                    toggleAuth('login');
                });

            } catch (error) {
                Swal.fire('Terjadi Kesalahan', error.message, 'error');
            }
        });

        // --- Logika Masuk (Login) ---
        document.getElementById('form-login').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('login-username').value;
            const password = document.getElementById('login-password').value;

            try {
                Swal.fire({title: 'Memeriksa Kredensial...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${username}`));
                
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    if(userData.password === password) {
                        localStorage.setItem('sesi_kas_sekolah', JSON.stringify({
                            username: username, 
                            nama: userData.nama_admin, 
                            unit: userData.unit,
                            role: userData.role
                        }));
                        
                        Swal.fire({toast: true, position: 'top-end', icon: 'success', title: 'Login Berhasil!', showConfirmButton: false, timer: 1500});
                        tampilkanDashboard(userData.nama_admin, userData.unit);
                        document.getElementById('form-login').reset();
                    } else {
                        Swal.fire('Akses Ditolak', 'Password yang Anda masukkan salah.', 'error');
                    }
                } else {
                    Swal.fire('Tidak Ditemukan', 'Username tersebut tidak terdaftar.', 'warning');
                }
            } catch (error) {
                Swal.fire('Gagal Koneksi', 'Tidak dapat terhubung ke database. Pastikan Realtime Database sudah dibuat.', 'error');
            }
        });

        // --- Logika Lupa Password ---
        window.showLupaPassword = async function() {
            const { value: username } = await Swal.fire({
                title: 'Pemulihan Akun',
                input: 'text',
                inputLabel: 'Masukkan Username Anda',
                inputPlaceholder: 'Ketik username...',
                showCancelButton: true,
                confirmButtonText: 'Lanjut',
                cancelButtonText: 'Batal'
            });

            if (username) {
                Swal.fire({title: 'Mencari Akun...', allowOutsideClick: false, didOpen: () => Swal.showLoading()});
                const dbRef = ref(db);
                const snapshot = await get(child(dbRef, `users/${username}`));
                
                if(snapshot.exists()) {
                    const userData = snapshot.val();
                    
                    const { value: jawaban } = await Swal.fire({
                        title: 'Jawab Pertanyaan Keamanan',
                        text: userData.pertanyaan_rahasia,
                        input: 'text',
                        inputPlaceholder: 'Jawaban Anda...',
                        showCancelButton: true,
                        confirmButtonText: 'Cek Jawaban'
                    });

                    if(jawaban) {
                        if(jawaban.toLowerCase() === userData.jawaban_rahasia.toLowerCase()) {
                            Swal.fire({
                                icon: 'info',
                                title: 'Password Ditemukan',
                                html: `Password Anda adalah: <br><b class="text-2xl text-primary mt-2 block">${userData.password}</b><br><span class="text-sm">Mohon ingat baik-baik atau catat!</span>`,
                            });
                        } else {
                            Swal.fire('Gagal', 'Jawaban keamanan Anda salah!', 'error');
                        }
                    }
                } else {
                    Swal.fire('Gagal', 'Username tidak ditemukan di sistem.', 'error');
                }
            }
        };

        // --- Tampilkan Dashboard (Anti-Refresh) ---
        function tampilkanDashboard(nama, unit) {
            document.getElementById('login-section').classList.add('hidden-section');
            document.getElementById('register-section').classList.add('hidden-section');
            document.getElementById('dashboard-section').classList.remove('hidden-section');
            
            document.getElementById('dash-user-name').innerText = nama;
            document.getElementById('dash-unit').innerText = unit === 'ALL' ? 'Yayasan (Semua Data)' : unit;
        }

        // --- Logika Logout ---
        window.logout = function() {
            Swal.fire({
                title: 'Yakin ingin keluar?',
                text: "Sesi Anda akan diakhiri.",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#d33',
                cancelButtonColor: '#3085d6',
                confirmButtonText: 'Ya, Keluar!',
                cancelButtonText: 'Batal'
            }).then((result) => {
                if (result.isConfirmed) {
                    localStorage.removeItem('sesi_kas_sekolah');
                    window.location.reload();
                }
            });
        };

        // --- Cek Sesi Otomatis ---
        window.onload = () => {
            const sesiAktif = localStorage.getItem('sesi_kas_sekolah');
            if(sesiAktif) {
                const dataSesi = JSON.parse(sesiAktif);
                tampilkanDashboard(dataSesi.nama, dataSesi.unit);
            }
        };
    </script>
</body>
</html>
